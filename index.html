<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MEMO → CSV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 1rem; color: #333;
            -webkit-overflow-scrolling: touch;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 1.5rem; font-size: 1.6rem; }
        .card {
            background: white; border-radius: 12px; padding: 1.2rem;
            margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .upload-zone {
            border: 3px dashed #667eea; border-radius: 8px; padding: 2rem 1rem;
            text-align: center; transition: all 0.2s; background: #f8f9ff;
        }
        .upload-zone.tap { border-color: #764ba2; background: #f0f2ff; }
        .upload-zone p { font-size: 0.95rem; color: #667eea; margin-bottom: 0.5rem; }
        .upload-zone small { color: #999; font-size: 0.8rem; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 0.7rem 1.5rem;
            border-radius: 8px; font-size: 16px; cursor: pointer;
            transition: opacity 0.2s; -webkit-appearance: none;
        }
        .btn:active { opacity: 0.7; }
        .btn-outline {
            background: white; border: 2px solid #667eea; color: #667eea;
            padding: 0.5rem 0.8rem; font-size: 0.85rem; border-radius: 8px;
        }
        .btn-outline.active { background: #667eea; color: white; }
        .mode-selector { display: flex; gap: 0.4rem; margin: 0.8rem 0; flex-wrap: wrap; }
        .preview-section { display: none; }
        .preview-section.active { display: block; }
        .tabs { display: flex; gap: 0; margin-bottom: 0.8rem; border-bottom: 2px solid #e0e0e0; }
        .tab {
            padding: 0.6rem 0.8rem; border: none; background: none;
            font-size: 0.9rem; color: #666;
            border-bottom: 3px solid transparent; transition: all 0.2s;
            -webkit-appearance: none;
        }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        pre {
            background: #f5f5f5; padding: 0.8rem; border-radius: 6px;
            overflow-x: auto; font-size: 0.8rem; line-height: 1.4;
            white-space: pre-wrap; word-break: break-all;
            max-height: 400px; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; min-width: 500px; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; vertical-align: top; font-size: 0.85rem; }
        th { background: #667eea; color: white; font-weight: 600; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }
        .actions { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .file-info { background: #e8f5e9; padding: 0.7rem; border-radius: 6px; margin-bottom: 0.8rem; color: #2e7d32; font-size: 0.85rem; }
        .stats { display: flex; gap: 0.5rem; margin: 0.8rem 0; flex-wrap: wrap; }
        .stat-item { background: #f8f9ff; border-radius: 8px; padding: 0.5rem 0.8rem; text-align: center; flex: 1; min-width: 90px; }
        .stat-item .num { font-size: 1.2rem; font-weight: bold; color: #667eea; }
        .stat-item .label { font-size: 0.7rem; color: #666; }
        .loading { display: none; text-align: center; padding: 1.5rem; }
        .loading.active { display: block; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .table-separator { margin: 1rem 0 0.5rem; font-weight: bold; color: #667eea; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 MEMO → CSV 変換</h1>
        <div class="card">
            <div class="upload-zone" id="uploadZone">
                <p>📁 .md ファイルを選択</p>
                <button class="btn" id="selectBtn" style="margin-top:0.5rem">ファイルを選択</button>
                <input type="file" id="fileInput" accept=".md,.markdown,.txt">
                <p style="margin-top:0.5rem"><small>対応形式: .md, .markdown, .txt</small></p>
            </div>
            <div id="loading" class="loading"><div class="spinner"></div><p>処理中...</p></div>
            <div id="fileInfo" class="file-info" style="display:none"></div>
            <div id="errorMessage" class="file-info" style="display:none;background:#ffebee;color:#c62828"></div>
        </div>
        <div class="card preview-section" id="previewSection">
            <div class="mode-selector">
                <button class="btn btn-outline active" data-mode="memo">📝 MEMO形式</button>
                <button class="btn btn-outline" data-mode="table">📊 テーブル</button>
                <button class="btn btn-outline" data-mode="line">💬 LINE形式</button>
                <button class="btn btn-outline" data-mode="flat">📄 全文</button>
            </div>
            <div id="statsArea" class="stats"></div>
            <div class="tabs">
                <button class="tab active" data-tab="preview">プレビュー</button>
                <button class="tab" data-tab="csv">CSV</button>
                <button class="tab" data-tab="original">元テキスト</button>
            </div>
            <div id="previewTab" class="tab-content active"><div class="table-wrap" id="tablePreview"></div></div>
            <div id="csvTab" class="tab-content"><pre id="csvPreview"></pre></div>
            <div id="originalTab" class="tab-content"><pre id="originalPreview"></pre></div>
            <div class="actions">
                <button class="btn" id="downloadBtn">💾 CSVダウンロード</button>
                <button class="btn" id="copyBtn" style="background:#43a047">📋 コピー</button>
                <button class="btn" id="resetBtn" style="background:#78909c">🔄 リセット</button>
            </div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';
        var currentCSV = '', currentFileName = '', currentMode = 'memo', rawContent = '';
        var modeData = {};
        function $(id) { return document.getElementById(id); }
        var zone = $('uploadZone'), input = $('fileInput'), info = $('fileInfo'),
            errEl = $('errorMessage'), preview = $('previewSection'), loading = $('loading');

        $('selectBtn').addEventListener('click', function(e) { e.stopPropagation(); input.click(); });
        zone.addEventListener('click', function(e) { if (e.target.tagName !== 'BUTTON') input.click(); });
        zone.addEventListener('touchstart', function() { zone.classList.add('tap'); }, {passive:true});
        zone.addEventListener('touchend', function() { zone.classList.remove('tap'); }, {passive:true});
        input.addEventListener('change', function(e) {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        document.querySelectorAll('.tab').forEach(function(t) {
            t.addEventListener('click', function() { switchTab(t.dataset.tab); });
        });
        document.querySelectorAll('[data-mode]').forEach(function(b) {
            b.addEventListener('click', function() {
                document.querySelectorAll('[data-mode]').forEach(function(x) { x.classList.remove('active'); });
                b.classList.add('active');
                currentMode = b.dataset.mode;
                if (rawContent) render();
            });
        });
        $('downloadBtn').addEventListener('click', downloadCSV);
        $('copyBtn').addEventListener('click', copyCSV);
        $('resetBtn').addEventListener('click', reset);

        function handleFile(file) {
            hideErr();
            var ext = '.' + file.name.split('.').pop().toLowerCase();
            if (['.md','.markdown','.txt'].indexOf(ext) === -1) {
                return showErr('対応形式: .md, .markdown, .txt');
            }
            currentFileName = file.name.replace(/\.[^/.]+$/, '') + '.csv';
            loading.classList.add('active');
            var r = new FileReader();
            r.onload = function(e) {
                rawContent = e.target.result;
                process(rawContent, file);
            };
            r.onerror = function() { showErr('ファイル読み込み失敗'); loading.classList.remove('active'); };
            r.readAsText(file, 'UTF-8');
        }

        function process(content, file) {
            loading.classList.remove('active');
            info.innerHTML = '<strong>' + file.name + '</strong> (' + fmt(file.size) + ')';
            info.style.display = 'block';
            modeData.memo = parseMemo(content);
            modeData.table = parseTables(content);
            modeData.line = parseLine(content);
            modeData.flat = content.split('\n').filter(function(l) { return l.trim(); });
            if (modeData.memo.length > 0) currentMode = 'memo';
            else if (modeData.line.length > 0) currentMode = 'line';
            else if (modeData.table.reduce(function(a,t){return a+t.length},0) > 0) currentMode = 'table';
            else currentMode = 'flat';
            document.querySelectorAll('[data-mode]').forEach(function(b) {
                b.classList.toggle('active', b.dataset.mode === currentMode);
            });
            render();
            $('originalPreview').textContent = content;
            preview.classList.add('active');
            switchTab('preview');
        }

        /*
         * MEMO Parser (FIXED v3)
         *
         * MEMO format structure:
         *   # MEMO
         *   - **section label**          ← top-level bullet = section
         *       plain text               ← indented = event title (after blank line)
         *       - detail bullet          ← indented sub-bullet = detail
         *         continuation text      ← indented non-bullet (no blank before) = detail continuation
         *       - another detail
         *           - sub-detail         ← deeper indent = still a detail
         *
         *   - 2025/11/7                  ← date section
         *       event 1 title
         *       - detail A
         *       - detail B
         *       event 2 title            ← new event (after blank line)
         *       - detail C
         *
         * Key fixes:
         *   1. Blank-line tracking: new event only after blank line, not after every indented text
         *   2. Sections with only details (no event text) are NOT skipped
         *   3. Multiple events under same section are correctly split
         *   4. HTML tags like <aside> are skipped
         */
        function parseMemo(md) {
            var lines = md.split('\n');
            var entries = [];
            var curSection = null;
            var curEvent = null;
            var curDetails = [];
            var curDetailText = '';
            var sawBlank = true;

            function flushDetail() {
                if (curDetailText) {
                    curDetails.push(curDetailText.trim());
                    curDetailText = '';
                }
            }
            function flushEvent() {
                flushDetail();
                // ★ FIX: push entry even if curEvent is null but details exist
                if (curEvent !== null || curDetails.length > 0) {
                    entries.push({
                        section: curSection || '',
                        event: curEvent || '',
                        details: curDetails.slice()
                    });
                }
                curEvent = null;
                curDetails = [];
            }
            function flushSection() {
                flushEvent();
                curSection = null;
            }

            for (var i = 0; i < lines.length; i++) {
                var rawLine = lines[i];

                // ★ FIX: track blank lines (don't just skip them)
                if (!rawLine.trim()) {
                    sawBlank = true;
                    continue;
                }

                var indent = rawLine.search(/\S/);
                var txt = rawLine.trim();

                // Skip HTML tags like <aside>, </aside>
                if (txt.match(/^<\/?[a-z]+>$/i)) { sawBlank = false; continue; }

                // Skip # headers
                if (indent === 0 && txt.charAt(0) === '#') continue;

                // Top-level bullet: - **label** or - 2025/11/7
                if (indent === 0 && txt.substring(0, 2) === '- ') {
                    flushSection();
                    curSection = txt.replace(/^-\s*/, '').replace(/\*\*/g, '').trim();
                    sawBlank = true;
                    continue;
                }

                // Indented sub-bullet at any level: - detail
                if (indent > 0 && txt.substring(0, 2) === '- ') {
                    flushDetail();
                    curDetailText = txt.replace(/^\s*-\s*/, '');
                    sawBlank = false;
                    continue;
                }

                // Indented non-bullet text
                if (indent > 0) {
                    if (sawBlank) {
                        // ★ FIX: new event only after blank line
                        flushEvent();
                        curEvent = txt;
                    } else if (curDetailText) {
                        // Continuation of current detail
                        curDetailText += ' ' + txt;
                    } else if (curEvent !== null) {
                        // Continuation of event title
                        curEvent += ' ' + txt;
                    } else {
                        // First content under section (no blank line before)
                        curEvent = txt;
                    }
                    sawBlank = false;
                    continue;
                }

                // Non-indented, non-bullet, non-header: flush section
                if (indent === 0) {
                    flushSection();
                    sawBlank = true;
                }
            }
            flushSection();
            return entries;
        }

        function parseTables(md) {
            var lines = md.split('\n'), tables = [];
            var cur = [], inT = false;
            for (var i = 0; i < lines.length; i++) {
                var t = lines[i].trim();
                if (t.charAt(0) === '|' && t.charAt(t.length-1) === '|' && t.length > 1) {
                    if (!inT) { inT = true; cur = []; }
                    if (t.match(/^\|[\s\-:|]+\|$/)) continue;
                    cur.push(t.split('|').slice(1, -1).map(function(c) { return c.trim(); }));
                } else {
                    if (inT && cur.length) { tables.push(cur); cur = []; inT = false; }
                }
            }
            if (inT && cur.length) tables.push(cur);
            return tables;
        }

        function parseLine(c) {
            var lines = c.split('\n'), msgs = [];
            var dt = '', pending = null;
            for (var i = 0; i < lines.length; i++) {
                var t = lines[i].trim();
                if (!t) continue;
                if (t.match(/^R?\d{1,2}\/\d{1,2}\/\d{1,2}(?:\([^)]+\))?$/)) {
                    if (pending) { msgs.push(pending); pending = null; }
                    dt = t;
                    continue;
                }
                var m = t.match(/^(\d{1,2}:\d{2})\t(.+?)\t(.+)$/);
                if (m) {
                    if (pending) msgs.push(pending);
                    var msg = m[3];
                    if (msg.charAt(0) === '"' && msg.charAt(msg.length-1) !== '"') {
                        pending = { date: dt, time: m[1], name: m[2], message: msg.slice(1) };
                    } else {
                        if (msg.charAt(0) === '"' && msg.charAt(msg.length-1) === '"') msg = msg.slice(1, -1);
                        msgs.push({ date: dt, time: m[1], name: m[2], message: msg });
                    }
                } else if (pending) {
                    if (t.charAt(t.length-1) === '"') {
                        pending.message += '\n' + t.slice(0, -1);
                        msgs.push(pending);
                        pending = null;
                    } else {
                        pending.message += '\n' + t;
                    }
                }
            }
            if (pending) msgs.push(pending);
            return msgs;
        }

        function esc(t) {
            t = String(t)
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/`(.*?)`/g, '$1')
                .replace(/\[(.*?)\]\(.*?\)/g, '$1')
                .replace(/^#+\s*/gm, '')
                .replace(/<[^>]+>/g, '');
            if (t.indexOf(',') !== -1 || t.indexOf('"') !== -1 || t.indexOf('\n') !== -1) {
                t = '"' + t.replace(/"/g, '""') + '"';
            }
            return t.trim();
        }
        function ehtml(t) {
            var d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function render() {
            var mode = currentMode;
            var data = modeData[mode];
            if (!data || !data.length) {
                mode = 'flat';
                data = modeData.flat;
            }
            var names = { memo: 'MEMO形式', table: 'テーブル', line: 'LINE形式', flat: '全文' };
            var rc = 0, cc = 0;
            if (mode === 'memo') {
                rc = data.length;
                cc = data.reduce(function(s, e) { return s + 1 + e.details.length; }, 0);
            } else if (mode === 'table') {
                rc = data.reduce(function(s, t) { return s + t.length; }, 0);
                cc = data.reduce(function(s, t) { return s + (t[0] ? t[0].length * t.length : 0); }, 0);
            } else if (mode === 'line') {
                rc = data.length;
                cc = data.length * 4;
            } else {
                rc = data.length;
                cc = data.length * 2;
            }
            $('statsArea').innerHTML =
                '<div class="stat-item"><div class="num">' + (names[mode] || '-') + '</div><div class="label">モード</div></div>' +
                '<div class="stat-item"><div class="num">' + rc + '</div><div class="label">行数</div></div>' +
                '<div class="stat-item"><div class="num">' + cc + '</div><div class="label">セル数</div></div>';
            if (mode === 'memo') { currentCSV = memo2csv(data); showMemo(data); }
            else if (mode === 'table') { currentCSV = tab2csv(data); showTable(data); }
            else if (mode === 'line') { currentCSV = line2csv(data); showLine(data); }
            else { currentCSV = flat2csv(data); showFlat(data); }
            $('csvPreview').textContent = currentCSV;
        }

        function memo2csv(entries) {
            var rows = ['セクション,イベント,詳細'];
            entries.forEach(function(e) {
                if (e.details.length === 0) {
                    rows.push(esc(e.section) + ',' + esc(e.event) + ',');
                } else {
                    e.details.forEach(function(d, i) {
                        if (i === 0) {
                            rows.push(esc(e.section) + ',' + esc(e.event) + ',' + esc(d));
                        } else {
                            rows.push(',,' + esc(d));
                        }
                    });
                }
            });
            return rows.join('\n');
        }
        function tab2csv(tables) {
            var rows = [];
            tables.forEach(function(t, i) {
                if (i > 0 && rows.length) rows.push('');
                t.forEach(function(r) {
                    rows.push(r.map(function(c) { return esc(c); }).join(','));
                });
            });
            return rows.join('\n');
        }
        function line2csv(msgs) {
            var rows = ['日付,時間,名前,メッセージ'];
            msgs.forEach(function(m) {
                rows.push(esc(m.date) + ',' + esc(m.time) + ',' + esc(m.name) + ',' + esc(m.message));
            });
            return rows.join('\n');
        }
        function flat2csv(lines) {
            var rows = ['行番号,内容'];
            lines.forEach(function(l, i) {
                rows.push((i + 1) + ',' + esc(l));
            });
            return rows.join('\n');
        }

        function showMemo(entries) {
            var c = $('tablePreview');
            if (!entries || !entries.length) { c.innerHTML = '<p style="padding:1rem;color:#999">MEMO形式のデータが見つかりませんでした</p>'; return; }
            var h = '<table><thead><tr><th>セクション</th><th>イベント</th><th>詳細</th></tr></thead><tbody>';
            entries.forEach(function(e) {
                var detailHtml = e.details.length ? e.details.map(function(d) { return ehtml(d); }).join('<br>') : '';
                h += '<tr><td>' + ehtml(e.section) + '</td><td>' + ehtml(e.event) + '</td><td>' + detailHtml + '</td></tr>';
            });
            h += '</tbody></table>';
            c.innerHTML = h;
        }
        function showTable(tables) {
            var c = $('tablePreview'); c.innerHTML = '';
            tables.forEach(function(t, i) {
                if (!t.length) return;
                if (tables.length > 1) {
                    var s = document.createElement('div');
                    s.className = 'table-separator';
                    s.textContent = 'テーブル ' + (i + 1);
                    c.appendChild(s);
                }
                var e = document.createElement('table'), th = document.createElement('thead'), hr = document.createElement('tr');
                t[0].forEach(function(x) { var th2 = document.createElement('th'); th2.textContent = x; hr.appendChild(th2); });
                th.appendChild(hr); e.appendChild(th);
                var tb = document.createElement('tbody');
                for (var j = 1; j < t.length; j++) {
                    var tr = document.createElement('tr');
                    t[j].forEach(function(x) { var td = document.createElement('td'); td.textContent = x; tr.appendChild(td); });
                    tb.appendChild(tr);
                }
                e.appendChild(tb); c.appendChild(e);
            });
        }
        function showLine(msgs) {
            var c = $('tablePreview');
            if (!msgs || !msgs.length) { c.innerHTML = '<p style="padding:1rem;color:#999">LINE形式のデータが見つかりません</p>'; return; }
            var h = '<table><thead><tr><th>日付</th><th>時間</th><th>名前</th><th>メッセージ</th></tr></thead><tbody>';
            msgs.slice(0, 200).forEach(function(m) {
                var msg = m.message.substring(0, 80);
                if (m.message.length > 80) msg += '...';
                h += '<tr><td>' + ehtml(m.date) + '</td><td>' + ehtml(m.time) + '</td><td>' + ehtml(m.name) + '</td><td>' + ehtml(msg) + '</td></tr>';
            });
            if (msgs.length > 200) h += '<tr><td colspan="4">... 他 ' + (msgs.length - 200) + ' 件</td></tr>';
            h += '</tbody></table>';
            c.innerHTML = h;
        }
        function showFlat(lines) {
            var c = $('tablePreview');
            var h = '<table><thead><tr><th>行番号</th><th>内容</th></tr></thead><tbody>';
            lines.slice(0, 200).forEach(function(l, i) {
                h += '<tr><td>' + (i + 1) + '</td><td>' + ehtml(l) + '</td></tr>';
            });
            if (lines.length > 200) h += '<tr><td colspan="2">... 他 ' + (lines.length - 200) + ' 行</td></tr>';
            h += '</tbody></table>';
            c.innerHTML = h;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === n); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
            $(n + 'Tab').classList.add('active');
        }

        // Safari-compatible download
        function downloadCSV() {
            if (!currentCSV) return;
            var bom = '\uFEFF';
            var blob = new Blob([bom + currentCSV], { type: 'text/csv;charset=utf-8;' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(function() {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // Copy to clipboard (Safari fallback)
        function copyCSV() {
            if (!currentCSV) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentCSV).then(function() {
                    alert('CSVをコピーしました');
                }).catch(function() {
                    fallbackCopy(currentCSV);
                });
            } else {
                fallbackCopy(currentCSV);
            }
        }
        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); alert('CSVをコピーしました'); } catch(e) { alert('コピーに失敗しました'); }
            document.body.removeChild(ta);
        }

        function reset() {
            currentCSV = ''; currentFileName = ''; rawContent = ''; input.value = '';
            info.style.display = 'none'; hideErr();
            preview.classList.remove('active');
            loading.classList.remove('active');
            $('tablePreview').innerHTML = '';
            $('csvPreview').textContent = '';
            $('originalPreview').textContent = '';
            $('statsArea').innerHTML = '';
            document.querySelectorAll('[data-mode]').forEach(function(b) { b.classList.toggle('active', b.dataset.mode === 'memo'); });
            currentMode = 'memo';
        }

        function showErr(m) { errEl.textContent = m; errEl.style.display = 'block'; }
        function hideErr() { errEl.style.display = 'none'; }
        function fmt(b) { return b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b / 1048576).toFixed(1) + ' MB'; }
    })();
    </script>
</body>
</html>
