<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Memo → CSV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 1rem; color: #333;
            -webkit-text-size-adjust: 100%;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 {
            color: white; text-align: center; margin-bottom: 1.5rem;
            font-size: 1.6rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white; border-radius: 12px; padding: 1.2rem;
            margin-bottom: 1.2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .upload-zone {
            border: 3px dashed #667eea; border-radius: 10px; padding: 2rem 1rem;
            text-align: center; cursor: pointer; transition: all 0.2s; background: #f8f9ff;
            touch-action: manipulation;
        }
        .upload-zone:active { border-color: #764ba2; background: #f0f2ff; transform: scale(0.99); }
        
        .upload-zone p { font-size: 1rem; color: #667eea; margin-bottom: 0.8rem; }
        .upload-zone small { color: #999; font-size: 0.8rem; }
        
        input[type="file"] { display: none; }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 0.9rem 1.5rem; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: all 0.2s; margin: 0.3rem;
            min-height: 48px; display: inline-flex; align-items: center; justify-content: center;
            touch-action: manipulation; width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-secondary {
            background: white; color: #667eea; border: 2px solid #667eea;
        }
        
        .file-info {
            background: #e8f5e9; padding: 0.8rem 1rem; border-radius: 8px;
            margin-bottom: 0.8rem; color: #2e7d32; font-size: 0.9rem; word-break: break-all;
        }
        
        .error {
            background: #ffebee; color: #c62828; padding: 0.8rem 1rem;
            border-radius: 8px; margin-bottom: 0.8rem; font-size: 0.9rem;
        }
        
        .preview-section { display: none; }
        .preview-section.active { display: block; }
        
        .tabs {
            display: flex; gap: 0; margin-bottom: 0.8rem;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            flex: 1; padding: 0.7rem 0.5rem; cursor: pointer; border: none;
            background: none; font-size: 0.9rem; color: #666;
            border-bottom: 3px solid transparent; transition: all 0.2s;
            touch-action: manipulation; text-align: center;
        }
        .tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; vertical-align: top; word-break: break-word; }
        th { background: #667eea; color: white; font-weight: 600; white-space: nowrap; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        pre {
            background: #f5f5f5; padding: 0.8rem; border-radius: 8px;
            overflow-x: auto; font-size: 0.8rem; line-height: 1.4;
            white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .actions { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .stats {
            display: flex; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap;
        }
        .stat-item {
            background: #f8f9ff; border-radius: 8px; padding: 0.5rem 0.8rem;
            text-align: center; flex: 1; min-width: 90px;
        }
        .stat-item .num { font-size: 1.2rem; font-weight: bold; color: #667eea; }
        .stat-item .label { font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Memo → CSV 変換</h1>
        
        <div class="card">
            <div class="upload-zone" id="uploadZone">
                <p>📁 .mdファイルをタップして選択</p>
                <input type="file" id="fileInput" accept=".md,.markdown,.txt">
                <p><small>対応形式: .md, .markdown, .txt</small></p>
            </div>
            <div id="fileInfo" class="file-info" style="display:none"></div>
            <div id="errorMessage" class="error" style="display:none"></div>
        </div>
        
        <div class="card preview-section" id="previewSection">
            <div id="statsArea" class="stats"></div>
            
            <div class="tabs">
                <button class="tab active" data-tab="preview">プレビュー</button>
                <button class="tab" data-tab="csv">CSV</button>
                <button class="tab" data-tab="original">元テキスト</button>
            </div>
            
            <div id="previewTab" class="tab-content active">
                <div class="table-wrap"><div id="tablePreview"></div></div>
            </div>
            <div id="csvTab" class="tab-content">
                <pre id="csvPreview"></pre>
            </div>
            <div id="originalTab" class="tab-content">
                <pre id="originalPreview"></pre>
            </div>
            
            <div class="actions">
                <button class="btn" id="downloadBtn">💾 CSVをダウンロード</button>
                <button class="btn btn-secondary" id="copyBtn">📋 CSVをコピー</button>
                <button class="btn btn-secondary" id="resetBtn">🔄 別のファイル</button>
            </div>
        </div>
    </div>

    <script>
        let currentCSV = '', currentFileName = '', rawContent = '';
        const $ = id => document.getElementById(id);
        
        // Event listeners
        $('uploadZone').addEventListener('click', e => {
            if (e.target.tagName !== 'INPUT') $('fileInput').click();
        });
        $('fileInput').addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => switchTab(t.dataset.tab));
        });
        $('downloadBtn').addEventListener('click', downloadCSV);
        $('copyBtn').addEventListener('click', copyCSV);
        $('resetBtn').addEventListener('click', reset);
        
        function handleFile(file) {
            hideErr();
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!['.md','.markdown','.txt'].includes(ext)) {
                return showErr('対応していない形式です。.md, .markdown, .txt のみ対応。');
            }
            currentFileName = file.name.replace(/\.[^/.]+$/, '') + '.csv';
            const r = new FileReader();
            r.onload = e => {
                rawContent = e.target.result;
                process(rawContent, file);
            };
            r.onerror = () => showErr('ファイル読み込みに失敗しました');
            r.readAsText(file, 'UTF-8');
        }
        
        function process(content, file) {
            info.innerHTML = '<strong>' + escHtml(file.name) + '</strong> (' + fmtSize(file.size) + ')';
            info.style.display = 'block';
            
            const entries = parseMemo(content);
            
            if (entries.length === 0) {
                showErr('Memoデータが見つかりませんでした。トップレベルの「- 」で始まるエントリが必要です。');
                return;
            }
            
            currentCSV = toCSV(entries);
            showPreview(entries);
            $('csvPreview').textContent = currentCSV;
            $('originalPreview').textContent = content;
            
            $('statsArea').innerHTML =
                '<div class="stat-item"><div class="num">' + entries.length + '</div><div class="label">エントリ数</div></div>' +
                '<div class="stat-item"><div class="num">' + entries.reduce((s,e) => s + e.details.length, 0) + '</div><div class="label">詳細数</div></div>';
            
            $('previewSection').classList.add('active');
            switchTab('preview');
        }
        
        // ===== MEMO PARSER =====
        function parseMemo(md) {
            const lines = md.split('\n');
            const entries = [];
            let cur = null;
            
            for (const line of lines) {
                if (!line.trim()) continue;
                
                const indent = line.search(/\S/);
                const text = line.trim();
                
                // Skip markdown headings (# ...)
                if (indent === 0 && text.startsWith('#')) continue;
                
                // Top-level bullet: - text
                if (indent === 0 && text.startsWith('- ')) {
                    if (cur) entries.push(cur);
                    cur = {
                        label: text.replace(/^\s*-\s*/, ''),
                        summary: '',
                        details: []
                    };
                } else if (cur) {
                    // Indented sub-bullet
                    if (text.startsWith('- ')) {
                        cur.details.push(text.replace(/^\s*-\s*/, ''));
                    } else {
                        // Indented non-bullet: first one = summary, rest = details
                        if (!cur.summary) {
                            cur.summary = text;
                        } else {
                            // Continuation of summary or standalone text
                            cur.details.push(text);
                        }
                    }
                }
            }
            if (cur) entries.push(cur);
            return entries;
        }
        
        // ===== CSV =====
        function escCSV(t) {
            t = String(t)
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/`(.*?)`/g, '$1')
                .replace(/\[(.*?)\]\(.*?\)/g, '$1')
                .replace(/<[^>]+>/g, '');
            if (t.includes(',') || t.includes('"') || t.includes('\n')) {
                t = '"' + t.replace(/"/g, '""') + '"';
            }
            return t;
        }
        
        function toCSV(entries) {
            const rows = [['ラベル/日付', '概要', '詳細']];
            entries.forEach(e => {
                rows.push([
                    escCSV(e.label),
                    escCSV(e.summary),
                    escCSV(e.details.join('\n'))
                ]);
            });
            return rows.map(r => r.join(',')).join('\n');
        }
        
        // ===== PREVIEW =====
        function showPreview(entries) {
            let h = '<table><thead><tr><th>ラベル/日付</th><th>概要</th><th>詳細</th></tr></thead><tbody>';
            entries.forEach(e => {
                const detail = e.details.length 
                    ? e.details.map(d => '• ' + escHtml(d)).join('<br>') 
                    : '';
                h += '<tr><td><strong>' + escHtml(e.label) + '</strong></td>' +
                     '<td>' + escHtml(e.summary) + '</td>' +
                     '<td>' + detail + '</td></tr>';
            });
            h += '</tbody></table>';
            $('tablePreview').innerHTML = h;
        }
        
        function escHtml(t) {
            const d = document.createElement('div');
            d.textContent = t; 
            return d.innerHTML;
        }
        
        // ===== UI =====
        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === n));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            $(n + 'Tab').classList.add('active');
        }
        
        function downloadCSV() {
            if (!currentCSV) return;
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, currentCSV], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 2000);
        }
        
        async function copyCSV() {
            if (!currentCSV) return;
            try {
                await navigator.clipboard.writeText(currentCSV);
                $('copyBtn').textContent = '✅ コピーしました';
                setTimeout(() => $('copyBtn').textContent = '📋 CSVをコピー', 2000);
            } catch (e) {
                // Fallback for older Safari
                const ta = document.createElement('textarea');
                ta.value = currentCSV;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                $('copyBtn').textContent = '✅ コピーしました';
                setTimeout(() => $('copyBtn').textContent = '📋 CSVをコピー', 2000);
            }
        }
        
        function reset() {
            currentCSV = ''; currentFileName = ''; rawContent = '';
            $('fileInput').value = '';
            info.style.display = 'none';
            hideErr();
            $('previewSection').classList.remove('active');
            $('tablePreview').innerHTML = '';
            $('csvPreview').textContent = '';
            $('originalPreview').textContent = '';
            $('statsArea').innerHTML = '';
        }
        
        function showErr(m) { $('errorMessage').textContent = m; $('errorMessage').style.display = 'block'; }
        function hideErr() { $('errorMessage').style.display = 'none'; }
        function fmtSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }
    </script>
</body>
</html>
